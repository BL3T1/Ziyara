name: syria_tourism_app
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # State Management & Architecture
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  get_it: ^9.0.5
  dartz: ^0.10.1

  # Networking
  dio: ^5.9.0
  connectivity_plus: ^7.0.0
  stomp_dart_client: 3.0.1

  # Secure token storage (Keychain on iOS, EncryptedSharedPreferences on Android)
  flutter_secure_storage: ^9.2.4

  # Navigation
  go_router: ^17.0.0

  # UI & Design
  flutter_svg: ^2.2.2
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.1
  smooth_page_indicator: ^1.2.1
  percent_indicator: ^4.2.5
  shimmer: ^3.0.0
  introduction_screen: ^4.0.0

  # Utilities
  shared_preferences: ^2.5.3
  image_picker: ^1.2.1
  url_launcher: ^6.3.2

  # Localization
  flutter_localization: ^0.3.3
  intl: ^0.20.2

  # Push Notifications (Firebase Cloud Messaging)
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

  # Biometrics (Authentication)
  local_auth: ^2.3.0
  local_auth_android: ^1.0.52
  local_auth_ios: any # 'any' allows the dependency_overrides below to pin the intl version
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^12.0.1
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

# Force all packages to use the same intl version (resolves version conflicts)
dependency_overrides:
  intl: ^0.20.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/flags/
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
