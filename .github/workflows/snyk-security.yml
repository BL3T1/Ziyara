name: Security Scans (Snyk)

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - development
  workflow_dispatch:

jobs:
  snyk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ziyarah_test
          POSTGRES_USER: ziyarah_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: front/my-app
        run: npm ci

      - name: Build frontend
        working-directory: front/my-app
        run: npm run build

      - name: Compile backend (no tests — faster for SCA scan)
        working-directory: core
        env:
          JWT_SECRET: snyk-ci-jwt-secret-key-must-be-at-least-32-bytes
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ziyarah_test
          SPRING_DATASOURCE_USERNAME: ziyarah_user
          SPRING_DATASOURCE_PASSWORD: test_password
        run: ./gradlew compileJava compileTestJava --no-daemon

      - name: Install Snyk CLI
        run: npm install -g snyk@latest

      - name: Snyk SCA (dependencies)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --all-projects --severity-threshold=high --fail-on=all

      - name: Snyk Code (SAST)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk code test --all-projects --severity-threshold=high --fail-on=all
