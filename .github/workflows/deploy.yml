  # ─────────────────────────────────────────────
  # Smoke test — verify the deployment is live
  # ─────────────────────────────────────────────
  smoke-test:
    name: Post-deploy smoke test
    needs: build-push  # change to [build-push, deploy] when the deploy job is re-enabled
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ github.event.inputs.environment || 'staging' }}
    if: vars.DEPLOY_BASE_URL != ''

    steps:
      - name: Wait for health
        run: |
          echo "Checking health at ${{ vars.DEPLOY_BASE_URL }}/api/v1/actuator/health"
          curl -sf \
            --max-time 10 \
            --retry 12 \
            --retry-delay 10 \
            --retry-connrefused \
            "${{ vars.DEPLOY_BASE_URL }}/api/v1/actuator/health" \
          | grep -q '"status":"UP"'
          echo "✓ Health check passed"

      - name: Verify OpenAPI is locked in production
        if: github.event.inputs.environment == 'production'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ vars.DEPLOY_BASE_URL }}/api/v1/swagger-ui.html")
          if [ "$STATUS" != "404" ] && [ "$STATUS" != "403" ]; then
            echo "ERROR: Swagger UI is exposed in production (HTTP $STATUS)"
            exit 1
          fi
          echo "✓ OpenAPI locked ($STATUS)"
