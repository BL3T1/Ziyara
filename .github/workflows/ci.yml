name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - V1
      - development
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend: unit + WebMvc slice tests (mock-based, no Docker required)
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend — unit & slice tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ziyarah_test
          POSTGRES_USER: ziyarah_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run unit & slice tests (docker-tagged tests excluded)
        working-directory: core
        env:
          JWT_SECRET: ci-test-jwt-secret-key-must-be-at-least-32-bytes-long
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ziyarah_test
          SPRING_DATASOURCE_USERNAME: ziyarah_user
          SPRING_DATASOURCE_PASSWORD: test_password
        run: ./gradlew test

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: core/build/reports/jacoco/test/

      - name: Upload test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: core/build/reports/tests/test/

  # ─────────────────────────────────────────────────────────────────────────────
  # Integration tests: Testcontainers suite (@Tag("docker"))
  # Covers: Flyway migration chain, functional API flows, Kafka broker,
  #         OpenAPI smoke, endpoint discovery — all via Testcontainers.
  # Docker is pre-installed on ubuntu-latest; no service containers needed.
  # ─────────────────────────────────────────────────────────────────────────────
  integration:
    name: Backend — integration tests (Testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run all tests including @Tag("docker") Testcontainers suite
        working-directory: core
        env:
          JWT_SECRET: ci-test-jwt-secret-key-must-be-at-least-32-bytes-long
          # Testcontainers will override datasource via @ServiceConnection;
          # this env var satisfies Spring's relaxed binding for other beans.
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/placeholder
          SPRING_DATASOURCE_USERNAME: ziyarah_user
          SPRING_DATASOURCE_PASSWORD: test_password
        run: ./gradlew test -PrunDockerTests

      - name: Upload integration test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: core/build/reports/tests/test/

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend: type-check, lint, vitest, build (all 3 surfaces)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (React / Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front/my-app/package-lock.json

      - name: Install dependencies
        working-directory: front/my-app
        run: npm ci

      - name: Type check
        working-directory: front/my-app
        run: npx tsc --noEmit

      - name: Lint
        working-directory: front/my-app
        run: npm run lint

      - name: Run tests
        working-directory: front/my-app
        run: npm test

      - name: Build (company surface)
        working-directory: front/my-app
        env:
          VITE_APP_SURFACE: company
          VITE_API_URL: /api/v1
        run: npm run build

      - name: Build (provider surface)
        working-directory: front/my-app
        env:
          VITE_APP_SURFACE: provider
          VITE_API_URL: /api/v1
        run: npm run build

      - name: Build (landing surface)
        working-directory: front/my-app
        env:
          VITE_APP_SURFACE: landing
          VITE_API_URL: /api/v1
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────────
  # Flutter: analyze, test, build APK (debug)
  # ─────────────────────────────────────────────────────────────────────────────
  flutter:
    name: Flutter mobile
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17 (required for Android toolchain)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze
        working-directory: mobile
        run: flutter analyze --no-pub

      - name: Run tests
        working-directory: mobile
        run: flutter test --no-pub

      - name: Build APK (debug)
        working-directory: mobile
        run: >
          flutter build apk --debug --no-pub
          --dart-define=ZIYARA_API_URL=${{ vars.API_URL || 'http://10.0.2.2:8080/api/v1' }}
