<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 48" fill="none">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="1" stdDeviation="0.5" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>
  <!-- Suitcase icon (left) - matches Figma Logo structure -->
  <g filter="url(#shadow)" transform="translate(0, 8)">
    <rect x="0" y="4" width="28" height="20" rx="2" stroke="#ac9e78" stroke-width="1.2" fill="none"/>
    <path d="M6 4V2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2" stroke="#ac9e78" stroke-width="1.2" fill="none"/>
    <text x="14" y="18" fill="white" font-family="Inter, sans-serif" font-size="6" font-weight="600" text-anchor="middle">ZIYARA</text>
    <path d="M8 26h8M10 28h4" stroke="#ac9e78" stroke-width="0.8" opacity="0.7"/>
  </g>
  <!-- Ziyara wordmark (right) - secondary color from Figma -->
  <text x="40" y="32" fill="#ac9e78" font-family="Inter, sans-serif" font-size="20" font-weight="600" filter="url(#shadow)">Ziyara</text>
</svg>
