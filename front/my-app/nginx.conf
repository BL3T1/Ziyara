server {
    listen 80 default_server;
    # Health checks use http://127.0.0.1/...; Host must match or nginx may not select this server
    server_name localhost 127.0.0.1;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Exact health (declare before `location /` for clarity)
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # WebSocket upgrade for STOMP/SockJS — must come before the /api/ block.
    # Without Upgrade/Connection headers the 101 handshake is rejected and the
    # live-dashboard stream silently falls back to polling (or drops entirely).
    location ^~ /api/v1/ws {
        proxy_pass http://backend:8080/api/v1/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host                $http_host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Proxy API + Swagger UI static assets to backend.
    # ^~ is required: otherwise `location ~* \.(js|css|...)$` below matches
    # /api/v1/swagger-ui/*.js and nginx serves 404 from the SPA root → blank Swagger UI.
    location ^~ /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        # Keep browser Host (e.g. localhost:3000) so Springdoc/Swagger don’t redirect the iframe to :8080
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
