# Run from the repo root (folder with this file) so Docker Compose loads `.env` next to this file.
# If POSTGRES_PASSWORD changes, use `docker compose down -v` once so Postgres re-inits the volume.
#
# ─── PROFILES ──────────────────────────────────────────────────────────────────
#  (none)       – core stack only: postgres, redis, kafka, backend
#  full         – base + company dashboard (exposed via NPM)
#  legacy       – base + company dashboard on port 7020
#
#  portmode     – ★ RECOMMENDED FOR LOCAL DEV ★  All 3 surfaces on separate HTTP ports
#                 + monitoring stack + pgAdmin + NPM. One command starts everything.
#                 docker compose --profile portmode up -d --build
#                 http://localhost:7050   → Company dashboard
#                 http://localhost:7060   → Provider portal
#                 http://localhost:7070   → Landing page
#                 http://localhost:7005   → API (direct, only if BACKEND_BIND_IP=0.0.0.0)
#                 http://localhost:7083   → Prometheus
#                 http://localhost:7085   → Grafana
#                 http://localhost:7065   → pgAdmin
#                 http://localhost:7081   → NPM admin UI
#                 From LAN: set PORTMODE_HOST=<your-lan-ip> in .env and rebuild.
#
#  multidomain  – nginx proxy routing by Host header (requires /etc/hosts entries):
#                   127.0.0.1  app.local   127.0.0.1  partners.local   127.0.0.1  www.local
#
#  npm          – Nginx Proxy Manager: domain-based reverse proxy with Let's Encrypt.
#                 HTTP: 7080, HTTPS: 7082, Admin UI: http://localhost:7081 (loopback only)
#
#  admin        – pgAdmin database GUI (heavy — ~300 MiB). Access: http://localhost:7065
#
#  monitoring   – Prometheus + Grafana + node-exporter (host metrics).
#                 Ports bound to 127.0.0.1 — use SSH tunnel for remote access.
#                 Grafana: http://localhost:7085   Prometheus: http://localhost:7083
#
#  ipmode       – Single gateway nginx with TLS termination on BIND_IP.
#                 Includes monitoring (Prometheus/Grafana) reachable on BIND_IP over HTTPS.
#                 pgAdmin is NOT in this profile — use SSH tunnel: ssh -L 7065:127.0.0.1:7065 user@server
#                 Requires: cd infra/certs && sh generate.sh   (first time only)
#                 Required .env vars: BIND_IP, BACKEND_BIND_IP=127.0.0.1,
#                   API_EXTERNAL_URL=https://IP:7005/api/v1, ZIYARA_CORS_ALLOWED_ORIGINS,
#                   GRAFANA_PASSWORD
# ───────────────────────────────────────────────────────────────────────────────
services:

  # =============================================================================
  # POSTGRES
  # =============================================================================
  postgres:
    image: postgres:15.17-alpine3.23
    container_name: ziyarah-db
    restart: unless-stopped
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_DB: ziyarah
      POSTGRES_USER: ziyarah_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:7001:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ziyarah_user -d ziyarah"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # PGBOUNCER — connection pooler in SESSION mode (required by RLS)
  #
  # Pool mode is SESSION (not transaction): the app's RlsAwareDataSource sets
  # session-level GUCs (app.current_user_id etc.) at connection acquire time.
  # Transaction-mode would silently clear these between statements, breaking RLS.
  #
  # First-time setup — populate infra/pgbouncer/userlist.txt before starting:
  #   docker compose up postgres -d
  #   docker exec -it ziyarah-db psql -U ziyarah_user -d ziyarah \
  #     -c "SELECT concat('\"', usename, '\" \"', passwd, '\"') FROM pg_shadow WHERE usename = 'ziyarah_user';"
  #   # Paste result into infra/pgbouncer/userlist.txt, then:
  #   docker compose up pgbouncer -d
  #
  # Admin console (inside Docker network):
  #   psql -h pgbouncer -p 5432 -U pgbouncer pgbouncer
  # =============================================================================
  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: ziyarah-pgbouncer
    restart: unless-stopped
    environment:
      # Database routing
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_DBNAME: ziyarah
      # SESSION mode — required: RlsAwareDataSource sets session-level GUCs
      # (app.current_user_id etc.) that must survive for the connection lifetime.
      PGBOUNCER_POOL_MODE: session
      PGBOUNCER_MAX_CLIENT_CONN: 100
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
      # Auth — userlist.txt holds real SCRAM-SHA-256 hashes from pg_shadow
      PGBOUNCER_LISTEN_PORT: 5432
      PGBOUNCER_AUTH_TYPE: scram-sha-256
      PGBOUNCER_AUTH_FILE: /etc/pgbouncer/userlist.txt
      PGBOUNCER_ADMIN_USERS: pgbouncer
      PGBOUNCER_STATS_USERS: pgbouncer
      # Spring JDBC sends application_name + extra_float_digits on connect
      PGBOUNCER_IGNORE_STARTUP_PARAMETERS: extra_float_digits,application_name
      PGBOUNCER_SERVER_CONNECT_TIMEOUT: 15
      PGBOUNCER_SERVER_IDLE_TIMEOUT: 600
      PGBOUNCER_LOG_CONNECTIONS: 0
      PGBOUNCER_LOG_DISCONNECTIONS: 0
      PGBOUNCER_LOG_POOLER_ERRORS: 1
    volumes:
      # The image generates pgbouncer.ini from env vars above — do NOT mount it.
      # Only mount userlist.txt; the image never overwrites it.
      - ./infra/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "127.0.0.1:7002:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 5432"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # =============================================================================
  # KAFKA (KRaft single node) — staff notification pipeline
  # =============================================================================
  kafka:
    image: apache/kafka:3.7.0
    container_name: ziyarah-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx256m"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # Retain messages 48 h; cap at 512 MB per topic to prevent unbounded disk growth
      KAFKA_LOG_RETENTION_HOURS: 48
      KAFKA_LOG_RETENTION_BYTES: 536870912
    ports:
      - "127.0.0.1:7004:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD-SHELL",
             "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 384m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # REDIS — JWT blocklist + login rate-limiting
  # =============================================================================
  redis:
    image: redis:7.2-alpine
    container_name: ziyarah-redis
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:7003:6379"
    volumes:
      - redis_data:/data
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # =============================================================================
  # BACKEND — Spring Boot
  # =============================================================================
  backend:
    build:
      context: ./core
      dockerfile: Dockerfile
    image: ziyarah-backend:latest
    container_name: ziyarah-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://pgbouncer:5432/ziyarah
      SPRING_DATASOURCE_USERNAME: ziyarah_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_SHOW_SQL: "false"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      ZIYARA_PII_ENCRYPTION_KEY_BASE64: ${ZIYARA_PII_ENCRYPTION_KEY_BASE64:?ZIYARA_PII_ENCRYPTION_KEY_BASE64 must be set (openssl rand -base64 32)}
      # Required: bootstrap password for the super-admin account on first startup.
      APP_DEMO_PASSWORD: ${APP_DEMO_PASSWORD:?APP_DEMO_PASSWORD must be set}
      SERVER_PORT: 8080
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,prometheus
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: when_authorized
      APP_MEDIA_STORAGE_ROOT: /data/media
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      ZIYARA_RATE_LIMIT_LOGIN_REDIS_ENABLED: "true"
      # Set ZIYARA_CORS_ALLOWED_ORIGINS in .env to your real domain(s).
      ZIYARA_CORS_ALLOWED_ORIGINS: ${ZIYARA_CORS_ALLOWED_ORIGINS:-}
      # JWT cookie flags: Secure must be false on plain-HTTP (portmode/LAN).
      # Set JWT_COOKIE_SECURE=true in .env only when running behind HTTPS.
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:-false}
      JWT_COOKIE_SAME_SITE: ${JWT_COOKIE_SAME_SITE:-Lax}
      # Return the token in the JSON body AND set the cookie so both auth
      # strategies (Bearer header and HttpOnly cookie) work simultaneously.
      JWT_ALSO_RETURN_TOKEN_IN_BODY: ${JWT_ALSO_RETURN_TOKEN_IN_BODY:-true}
    ports:
      # Default 127.0.0.1 keeps the API off the public internet when running behind
      # a reverse proxy (NPM or ipmode gateway). Override to 0.0.0.0 only for
      # direct-access deployments where no proxy sits in front.
      - "${BACKEND_BIND_IP:-127.0.0.1}:${BACKEND_PORT:-7005}:8080"
    volumes:
      - media_data:/data/media
    depends_on:
      pgbouncer:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024m
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # =============================================================================
  # FRONTEND — single bundle (profile: full). Exposed via NPM on internal network.
  # =============================================================================
  frontend:
    profiles:
      - full
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_SURFACE: company
    image: ziyarah-frontend:latest
    container_name: ziyarah-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # =============================================================================
  # DASHBOARD — legacy local port 7020 (profile: legacy)
  # =============================================================================
  dashboard:
    profiles:
      - legacy
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_SURFACE: company
    image: ziyarah-dashboard:latest
    container_name: ziyarah-dashboard
    restart: unless-stopped
    ports:
      - "7020:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # =============================================================================
  # MULTI-DOMAIN — edge proxy + 3 separate frontend bundles (profile: multidomain)
  # Requires /etc/hosts: 127.0.0.1 app.local  127.0.0.1 partners.local  127.0.0.1 www.local
  # =============================================================================
  dashboard-company:
    profiles:
      - multidomain
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_SURFACE: company
        VITE_PROVIDER_APP_URL: http://partners.local
    image: ziyarah-dashboard-company:latest
    container_name: ziyarah-dashboard-company
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  dashboard-provider:
    profiles:
      - multidomain
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_SURFACE: provider
    image: ziyarah-dashboard-provider:latest
    container_name: ziyarah-dashboard-provider
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  landing:
    profiles:
      - multidomain
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_SURFACE: landing
        VITE_COMPANY_APP_URL: http://app.local
        VITE_PROVIDER_APP_URL: http://partners.local
    image: ziyarah-landing:latest
    container_name: ziyarah-landing
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  proxy:
    profiles:
      - multidomain
    image: nginx:1.28.2-alpine
    container_name: ziyarah-proxy
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./infra/nginx/multi-domain.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      dashboard-company:
        condition: service_healthy
      dashboard-provider:
        condition: service_healthy
      landing:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # =============================================================================
  # PORT MODE — 3 surfaces on separate HTTP ports (profile: portmode)
  # ★ RECOMMENDED FOR LOCAL DEV ★
  # =============================================================================
  company-portmode:
    profiles:
      - portmode
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_SURFACE: company
        VITE_PROVIDER_APP_URL: http://${PORTMODE_HOST:-localhost}:${PROVIDER_PORT:-7060}
    image: ziyarah-company-portmode:latest
    container_name: ziyarah-company-portmode
    restart: unless-stopped
    ports:
      - "${BIND_IP:-0.0.0.0}:${COMPANY_PORT:-7050}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  provider-portmode:
    profiles:
      - portmode
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_SURFACE: provider
    image: ziyarah-provider-portmode:latest
    container_name: ziyarah-provider-portmode
    restart: unless-stopped
    ports:
      - "${BIND_IP:-0.0.0.0}:${PROVIDER_PORT:-7060}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  landing-portmode:
    profiles:
      - portmode
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_SURFACE: landing
        VITE_COMPANY_APP_URL: http://${PORTMODE_HOST:-localhost}:${COMPANY_PORT:-7050}
        VITE_PROVIDER_APP_URL: http://${PORTMODE_HOST:-localhost}:${PROVIDER_PORT:-7060}
    image: ziyarah-landing-portmode:latest
    container_name: ziyarah-landing-portmode
    restart: unless-stopped
    ports:
      - "${BIND_IP:-0.0.0.0}:${LANDING_PORT:-7070}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # =============================================================================
  # IP MODE — TLS gateway; all surfaces behind it (profile: ipmode)
  # cd infra/certs && sh generate.sh   (first time only)
  # =============================================================================
  company-ipmode:
    profiles:
      - ipmode
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${API_EXTERNAL_URL:-https://10.45.30.145:7005/api/v1}
        VITE_APP_SURFACE: company
        VITE_PROVIDER_APP_URL: ${PROVIDER_URL:-https://10.45.30.145:7060}
    image: ziyarah-company-ipmode:latest
    container_name: ziyarah-company-ipmode
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  provider-ipmode:
    profiles:
      - ipmode
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${API_EXTERNAL_URL:-https://10.45.30.145:7005/api/v1}
        VITE_APP_SURFACE: provider
    image: ziyarah-provider-ipmode:latest
    container_name: ziyarah-provider-ipmode
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  landing-ipmode:
    profiles:
      - ipmode
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${API_EXTERNAL_URL:-https://10.45.30.145:7005/api/v1}
        VITE_APP_SURFACE: landing
        VITE_COMPANY_APP_URL: ${COMPANY_URL:-https://10.45.30.145:7050}
        VITE_PROVIDER_APP_URL: ${PROVIDER_URL:-https://10.45.30.145:7060}
    image: ziyarah-landing-ipmode:latest
    container_name: ziyarah-landing-ipmode
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  gateway:
    profiles:
      - ipmode
    image: nginx:1.28.2-alpine
    container_name: ziyarah-gateway
    restart: unless-stopped
    ports:
      - "${BIND_IP:-127.0.0.1}:${BACKEND_PORT:-7005}:${BACKEND_PORT:-7005}"
      - "${BIND_IP:-127.0.0.1}:${COMPANY_PORT:-7050}:${COMPANY_PORT:-7050}"
      - "${BIND_IP:-127.0.0.1}:${PROVIDER_PORT:-7060}:${PROVIDER_PORT:-7060}"
      - "${BIND_IP:-127.0.0.1}:${LANDING_PORT:-7070}:${LANDING_PORT:-7070}"
      - "${BIND_IP:-127.0.0.1}:${PROMETHEUS_PORT:-7083}:${PROMETHEUS_PORT:-7083}"
      - "${BIND_IP:-127.0.0.1}:${GRAFANA_PORT:-7085}:${GRAFANA_PORT:-7085}"
    volumes:
      - ./infra/nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certs/server.crt:/etc/nginx/certs/server.crt:ro
      - ./infra/certs/server.key:/etc/nginx/certs/server.key:ro
    depends_on:
      backend:
        condition: service_healthy
      company-ipmode:
        condition: service_healthy
      provider-ipmode:
        condition: service_healthy
      landing-ipmode:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      grafana:
        condition: service_healthy
    networks:
      - ziyarah-network
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # =============================================================================
  # CADVISOR — per-container CPU / RAM / network / I/O metrics (profile: monitoring)
  # Access: http://localhost:7086/metrics  (loopback only)
  # =============================================================================
  cadvisor:
    profiles:
      - monitoring
      - portmode
      - ipmode
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: ziyarah-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports:
      - "127.0.0.1:7086:8080"
    networks:
      - ziyarah-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # =============================================================================
  # NODE EXPORTER — host CPU / RAM / disk / network metrics (profile: monitoring)
  # Access: http://localhost:7084/metrics  (loopback only)
  # =============================================================================
  node-exporter:
    profiles:
      - monitoring
      - portmode
      - ipmode
    image: prom/node-exporter:v1.8.2
    container_name: ziyarah-node-exporter
    restart: unless-stopped
    pid: "host"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "127.0.0.1:7084:9100"
    networks:
      - ziyarah-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # =============================================================================
  # LOKI — log aggregation backend (profile: monitoring)
  # Collects container logs shipped by Promtail.
  # Access: http://localhost:7087  (loopback only — use SSH tunnel for remote)
  # =============================================================================
  loki:
    profiles:
      - monitoring
      - portmode
      - ipmode
    image: grafana/loki:3.4.2
    pull_policy: missing
    container_name: ziyarah-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:7087:3100"
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # PROMTAIL — log shipper: reads Docker json-file logs and pushes to Loki
  # (profile: monitoring)
  # =============================================================================
  promtail:
    profiles:
      - monitoring
      - portmode
      - ipmode
    image: grafana/promtail:3.4.2
    pull_policy: missing
    container_name: ziyarah-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./infra/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - ziyarah-network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # =============================================================================
  # PROMETHEUS — metrics scraper (profile: monitoring)
  # Access: http://localhost:7083  (loopback only — SSH tunnel for remote access)
  # =============================================================================
  prometheus:
    profiles:
      - monitoring
      - portmode
      - ipmode
    image: ubuntu/prometheus:3.11-26.04_stable
    pull_policy: missing
    container_name: ziyarah-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-7083}:9090"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "/bin/promtool", "check", "healthy", "--url=http://localhost:9090"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # GRAFANA — dashboards (profile: monitoring)
  # Access: http://localhost:7085  (loopback only — SSH tunnel for remote access)
  # Set GRAFANA_PASSWORD in .env before starting.
  # =============================================================================
  grafana:
    profiles:
      - monitoring
      - portmode
      - ipmode
    image: grafana/grafana:11.6.0
    pull_policy: missing
    container_name: ziyarah-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # In ipmode, Grafana is served behind the TLS gateway — set root URL so
      # redirects and asset paths resolve to the public HTTPS origin, not localhost:3000.
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-http://localhost:7085}
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_BIND_IP:-0.0.0.0}:${GRAFANA_PORT:-7085}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # =============================================================================
  # PGADMIN — PostgreSQL admin UI (profile: admin)
  # Access: http://localhost:7065  (loopback only)
  # Server: Host=postgres  Port=5432  DB=ziyarah  User=ziyarah_user
  # =============================================================================
  pgadmin:
    profiles:
      - admin
      - portmode
    image: dpage/pgadmin4:9
    container_name: ziyarah-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD must be set}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      # Loopback only — DB admin UI must never be public-facing.
      - "${PGADMIN_BIND_IP:-127.0.0.1}:${PGADMIN_PORT:-7065}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./infra/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ziyarah-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # =============================================================================
  # NGINX PROXY MANAGER — domain-based reverse proxy with Let's Encrypt (profile: npm)
  # HTTP: 7080 (public)   HTTPS: 7082 (public)   Admin UI: 127.0.0.1:7081 (loopback only)
  # First login: admin@example.com / changeme  — change immediately after first boot.
  # =============================================================================
  nginx-proxy-manager:
    profiles:
      - npm
      - portmode
    image: jc21/nginx-proxy-manager:2.15.1
    container_name: ziyarah-npm
    restart: unless-stopped
    ports:
      - "7080:80"
      - "7082:443"
      - "127.0.0.1:7081:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:81/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  npm-init:
    profiles:
      - npm
      - portmode
    image: alpine:3.20
    container_name: ziyarah-npm-init
    restart: "no"
    command: sh -c "apk add -q --no-cache curl && sh /init.sh"
    volumes:
      - ./infra/npm/init.sh:/init.sh:ro
    environment:
      NPM_ADMIN_EMAIL: ${NPM_ADMIN_EMAIL:-admin@example.com}
      NPM_ADMIN_PASS: ${NPM_ADMIN_PASS:-changeme}
    depends_on:
      nginx-proxy-manager:
        condition: service_healthy
    networks:
      - ziyarah-network

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  media_data:
    driver: local
  kafka_data:
    driver: local
  pgadmin_data:
    driver: local
  prometheus_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local
  npm_data:
    driver: local
  npm_letsencrypt:
    driver: local

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  ziyarah-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
