# Run from the repo root (folder with this file) so Docker Compose loads `.env` next to this file.
# If POSTGRES_PASSWORD changes, use `docker compose ... down -v` once so Postgres re-inits the volume.
#
# ─── PROFILES ──────────────────────────────────────────────────────────────────
#  (none)       – backend + infra only (postgres, redis, kafka, pgadmin)
#  full         – base + company dashboard on port 80
#  legacy       – base + company dashboard on port 3000
#
#  portmode     – ★ RECOMMENDED FOR LOCAL DEV ★
#                 All 3 surfaces on separate HTTP ports — no TLS, no /etc/hosts.
#                 Works from localhost AND from any LAN IP (10.x, 192.168.x, etc.).
#                 docker compose --profile portmode up -d --build
#                 http://localhost:7050   → Company dashboard
#                 http://localhost:7060   → Provider portal
#                 http://localhost:7070   → Landing page
#                 http://localhost:8080   → API (direct)
#                 From LAN: replace localhost with PORTMODE_HOST in .env, then rebuild.
#
#  multidomain  – nginx proxy routing by Host header (requires /etc/hosts entries):
#                   127.0.0.1  app.local
#                   127.0.0.1  partners.local
#                   127.0.0.1  www.local
#                 Does NOT work with a raw IP address — use portmode instead.
#
#  ipmode       – single gateway nginx with TLS termination on BIND_IP (for mobile/Android).
#                 Requires running infra/certs/generate.sh first (needs openssl + bash/WSL).
#                 Must use https:// — the gateway rejects plain HTTP.
#                 Required .env vars for ipmode:
#                   BIND_IP=10.45.30.145
#                   BACKEND_BIND_IP=127.0.0.1
#                   PGADMIN_BIND_IP=127.0.0.1
#                   BACKEND_PORT=9000
#                   COMPANY_PORT=7050
#                   PROVIDER_PORT=7060
#                   LANDING_PORT=7070
#                   PGADMIN_PORT=7075
#                   API_EXTERNAL_URL=https://10.45.30.145:9000/api/v1
#                   ZIYARA_CORS_ALLOWED_ORIGINS=https://10.45.30.145:7050,https://10.45.30.145:7060,https://10.45.30.145:7070
# ───────────────────────────────────────────────────────────────────────────────
services:
  # =============================================================================
  # DATABASE SERVICE - PostgreSQL
  # =============================================================================
  postgres:
    image: postgres:15.17-alpine3.23
    container_name: ziyarah-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ziyarah
      POSTGRES_USER: ziyarah_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      # Loopback only — reachable from local dev tools (TablePlus, psql) but NOT from LAN.
      # Internal Docker network always exposes postgres:5432 to other containers regardless.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ziyarah_user -d ziyarah"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  # =============================================================================
  # DATABASE SERVICE - PostgreSQL
  # =============================================================================
  jira-db:
    image: postgres:15.17-alpine3.23
    pull_policy: never
    container_name: ziyarah-jira-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: jiradb
      POSTGRES_USER: jira
      POSTGRES_PASSWORD: jira
    ports:
      - "5433:5432"   # exposed separately so you can connect with a DB client
    volumes:
      - jira_pgdata:/var/lib/postgresql/data
    networks:
      - ziyarah-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U jira -d jiradb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  jira:
    image: atlassian/jira-servicemanagement:10.3.2-ubi9
    pull_policy: never
    container_name: ziyarah-jira
    restart: unless-stopped
    ports:
      - "8090:8080"   # Jira UI → http://localhost:8090
    environment:
      ATL_JDBC_URL: jdbc:postgresql://jira-db:5432/jiradb
      ATL_JDBC_USER: jira
      ATL_JDBC_PASSWORD: jira
      ATL_DB_DRIVER: org.postgresql.Driver
      ATL_DB_TYPE: postgres72
      ATL_DB_SCHEMA_NAME: public
      JVM_MINIMUM_MEMORY: 384m
      JVM_MAXIMUM_MEMORY: 1536m
    volumes:
      - jira_data:/var/atlassian/application-data/jira
    networks:
      - ziyarah-network
    depends_on:
      jira-db:
        condition: service_healthy




  # =============================================================================
  # KAFKA (KRaft single node) — staff notification pipeline
  # =============================================================================
  kafka:
    image: apache/kafka:3.7.0
    container_name: ziyarah-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      # Loopback only — Kafka is an internal messaging bus; not needed outside the host.
      - "127.0.0.1:9092:9092"
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD-SHELL",
             "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # =============================================================================
  # REDIS — JWT blocklist + login rate-limiting
  # =============================================================================
  redis:
    image: redis:7.2-alpine
    container_name: ziyarah-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      # Loopback only — Redis is an internal cache; not needed outside the host.
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # =============================================================================
  # BACKEND SERVICE - Spring Boot
  # =============================================================================
  backend:
    build:
      context: ./core
      dockerfile: Dockerfile
    image: ziyarah-backend:latest
    container_name: ziyarah-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ziyarah
      SPRING_DATASOURCE_USERNAME: ziyarah_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      # Schema is managed by Flyway (core/src/main/resources/db/migration/). Hibernate DDL-auto is disabled; Flyway runs on startup.
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_SHOW_SQL: "false"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      APP_DEMO_PASSWORD: ${APP_DEMO_PASSWORD:-Demo123!}
      JWT_EXPIRATION: 86400000
      SERVER_PORT: 8080
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics
      # Use underscores; hyphens break relaxed binding for show-details
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: when_authorized
      APP_MEDIA_STORAGE_ROOT: /data/media
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      ZIYARA_RATE_LIMIT_LOGIN_REDIS_ENABLED: "true"
      # CORS: set via .env for ipmode (e.g. http://10.45.30.145:7050,http://10.45.30.145:7060,http://10.45.30.145:7070)
      # Leave empty to use allow-local-defaults (localhost/127.0.0.1) in dev.
      ZIYARA_CORS_ALLOWED_ORIGINS: ${ZIYARA_CORS_ALLOWED_ORIGINS:-}
    ports:
      # BACKEND_BIND_IP defaults to 0.0.0.0 in dev (direct access via localhost:8080).
      # In ipmode set BACKEND_BIND_IP=127.0.0.1 so only the gateway can reach the API.
      - "${BACKEND_BIND_IP:-0.0.0.0}:${BACKEND_PORT:-8080}:8080"
    volumes:
      - media_data:/data/media
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  # =============================================================================
  # FRONTEND (Vite/company) - single bundle on port 80; use 'multidomain' profile for all 3 surfaces
  # =============================================================================
  frontend:
    profiles:
      - full
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_SURFACE: company
    image: ziyarah-frontend:latest
    container_name: ziyarah-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =============================================================================
  # DASHBOARD (Vite) — legacy local port :3000 (opt-in profile only; not used for prod-like tests)
  # =============================================================================
  dashboard:
    profiles:
      - legacy
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_SURFACE: company
    image: ziyarah-dashboard:latest
    container_name: ziyarah-dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      # 127.0.0.1 avoids IPv6 localhost (::1) failing when nginx is IPv4-only
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # =============================================================================
  # MULTI-DOMAIN (profile: multidomain) — edge proxy + company / provider / landing bundles
  # =============================================================================
  dashboard-company:
    profiles:
      - multidomain
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_SURFACE: company
    image: ziyarah-dashboard-company:latest
    container_name: ziyarah-dashboard-company
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  dashboard-provider:
    profiles:
      - multidomain
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_SURFACE: provider
    image: ziyarah-dashboard-provider:latest
    container_name: ziyarah-dashboard-provider
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  landing:
    profiles:
      - multidomain
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_SURFACE: landing
        VITE_COMPANY_APP_URL: http://app.local
        VITE_PROVIDER_APP_URL: http://partners.local
    image: ziyarah-landing:latest
    container_name: ziyarah-landing
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  proxy:
    profiles:
      - multidomain
    image: nginx:1.28.2-alpine
    container_name: ziyarah-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/multi-domain.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      dashboard-company:
        condition: service_healthy
      dashboard-provider:
        condition: service_healthy
      landing:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network

  # =============================================================================
  # PORT MODE — 3 surfaces on separate HTTP ports. No TLS, no Host-header routing.
  # Works from localhost or any LAN IP without any extra config.
  # Each container proxies /api/ → backend:8080 internally, so no CORS issues.
  #
  # Start:  docker compose --profile portmode up -d --build
  # Access (localhost):
  #   http://localhost:7050  — Company dashboard
  #   http://localhost:7060  — Provider portal
  #   http://localhost:7070  — Landing / booking
  #   http://localhost:8080  — API
  # Access (LAN): set PORTMODE_HOST=<your-lan-ip> in .env and rebuild.
  # =============================================================================
  company-portmode:
    profiles:
      - portmode
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_SURFACE: company
    image: ziyarah-company-portmode:latest
    container_name: ziyarah-company-portmode
    restart: unless-stopped
    ports:
      - "${BIND_IP:-0.0.0.0}:${COMPANY_PORT:-7050}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  provider-portmode:
    profiles:
      - portmode
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_SURFACE: provider
    image: ziyarah-provider-portmode:latest
    container_name: ziyarah-provider-portmode
    restart: unless-stopped
    ports:
      - "${BIND_IP:-0.0.0.0}:${PROVIDER_PORT:-7060}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  landing-portmode:
    profiles:
      - portmode
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_SURFACE: landing
        # These are baked into the bundle at build time.
        # Default: localhost — works for same-machine access.
        # For LAN access: set PORTMODE_HOST=10.45.30.145 in .env before building.
        VITE_COMPANY_APP_URL: http://${PORTMODE_HOST:-localhost}:${COMPANY_PORT:-7050}
        VITE_PROVIDER_APP_URL: http://${PORTMODE_HOST:-localhost}:${PROVIDER_PORT:-7060}
    image: ziyarah-landing-portmode:latest
    container_name: ziyarah-landing-portmode
    restart: unless-stopped
    ports:
      - "${BIND_IP:-0.0.0.0}:${LANDING_PORT:-7070}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # =============================================================================
  # IP MODE — single gateway nginx terminates TLS; all surfaces behind it.
  # The gateway is the only container with public ports on BIND_IP.
  # Frontend containers use expose: (internal Docker network only).
  #
  # Required .env settings (see .env.example ipmode section):
  #   BIND_IP=10.45.30.145
  #   BACKEND_BIND_IP=127.0.0.1
  #   PGADMIN_BIND_IP=127.0.0.1
  #   API_EXTERNAL_URL=https://10.45.30.145:9000/api/v1
  #   ZIYARA_CORS_ALLOWED_ORIGINS=https://10.45.30.145:7050,...
  #
  # Start with:
  #   cd infra/certs && sh generate.sh   # first time only
  #   docker compose --profile ipmode up -d --build
  # =============================================================================
  company-ipmode:
    profiles:
      - ipmode
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        # VITE vars are baked in at build time — must be set in .env before build.
        # For ipmode: set API_EXTERNAL_URL=https://10.45.30.145:9000/api/v1 in .env before building.
        VITE_API_URL: ${API_EXTERNAL_URL:-https://10.45.30.145:9000/api/v1}
        VITE_APP_SURFACE: company
    image: ziyarah-company-ipmode:latest
    container_name: ziyarah-company-ipmode
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  provider-ipmode:
    profiles:
      - ipmode
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${API_EXTERNAL_URL:-https://10.45.30.145:9000/api/v1}
        VITE_APP_SURFACE: provider
    image: ziyarah-provider-ipmode:latest
    container_name: ziyarah-provider-ipmode
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  landing-ipmode:
    profiles:
      - ipmode
    build:
      context: ./front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${API_EXTERNAL_URL:-https://10.45.30.145:9000/api/v1}
        VITE_APP_SURFACE: landing
        # CTA links in the landing page that point to the other two surfaces.
        # Override COMPANY_URL / PROVIDER_URL in .env if ports or IP change.
        VITE_COMPANY_APP_URL: ${COMPANY_URL:-https://10.45.30.145:7050}
        VITE_PROVIDER_APP_URL: ${PROVIDER_URL:-https://10.45.30.145:7060}
    image: ziyarah-landing-ipmode:latest
    container_name: ziyarah-landing-ipmode
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Gateway: single nginx that terminates TLS for every public port in ipmode.
  # It is the ONLY container bound to BIND_IP; everything else is internal.
  gateway:
    profiles:
      - ipmode
    image: nginx:1.28.2-alpine
    container_name: ziyarah-gateway
    restart: unless-stopped
    ports:
      # Default 127.0.0.1 keeps gateway off the LAN when BIND_IP is unset (non-ipmode contexts).
      # For ipmode deployments BIND_IP MUST be set to the server LAN IP (e.g. 10.45.30.145).
      - "${BIND_IP:-127.0.0.1}:${BACKEND_PORT:-9000}:${BACKEND_PORT:-9000}"
      - "${BIND_IP:-127.0.0.1}:${COMPANY_PORT:-7050}:${COMPANY_PORT:-7050}"
      - "${BIND_IP:-127.0.0.1}:${PROVIDER_PORT:-7060}:${PROVIDER_PORT:-7060}"
      - "${BIND_IP:-127.0.0.1}:${LANDING_PORT:-7070}:${LANDING_PORT:-7070}"
      - "${BIND_IP:-127.0.0.1}:${PGADMIN_PORT:-7075}:${PGADMIN_PORT:-7075}"
    volumes:
      - ./infra/nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certs/server.crt:/etc/nginx/certs/server.crt:ro
      - ./infra/certs/server.key:/etc/nginx/certs/server.key:ro
    depends_on:
      backend:
        condition: service_healthy
      company-ipmode:
        condition: service_healthy
      provider-ipmode:
        condition: service_healthy
      landing-ipmode:
        condition: service_healthy
      pgadmin:
        condition: service_started
    networks:
      - ziyarah-network

  # =============================================================================
  # PGADMIN - PostgreSQL admin UI (optional: docker compose up ... pgadmin)
  # Login: PGADMIN_DEFAULT_EMAIL / PGADMIN_DEFAULT_PASSWORD (defaults below).
  # Add server: Host=postgres, Port=5432, DB=ziyarah, User=ziyarah_user, Password=${POSTGRES_PASSWORD}
  # =============================================================================
  pgadmin:
    image: dpage/pgadmin4:9
    container_name: ziyarah-pgadmin
    restart: unless-stopped
    environment:
      # pgAdmin 9+ rejects .local as invalid (reserved TLD); use a normal domain for the default login email.
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD must be set}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      # PGADMIN_BIND_IP defaults to 0.0.0.0 in dev (direct access via localhost:5050).
      # In ipmode set PGADMIN_BIND_IP=127.0.0.1 so only the gateway serves pgAdmin.
      - "${PGADMIN_BIND_IP:-0.0.0.0}:${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ziyarah-network

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  media_data:
    driver: local
  pgadmin_data:
    driver: local
  jira_pgdata:
    driver: local
  jira_data:
    driver: local


