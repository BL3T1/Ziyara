global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'ziyara'

scrape_configs:
  # Spring Boot Actuator — JVM, HTTP request rates, DB pool, Kafka, Redis
  - job_name: 'ziyara-backend'
    metrics_path: '/api/v1/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Host machine metrics (CPU, RAM, disk, network)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Per-container Docker metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      # Extract 12-char short container ID from the cgroup id path.
      # /docker/180f88675f3b... → container="180f88675f3b"
      # Non-container paths (/, /docker, /docker/buildkit) produce no match → container=""
      - source_labels: [id]
        regex: '/docker/([a-f0-9]{12})[a-f0-9]+'
        target_label: container
        replacement: '$1'

