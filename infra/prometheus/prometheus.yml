global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'ziyara'

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Spring Boot Actuator — JVM, HTTP request rates, DB pool, Kafka, Redis
  # Both backend replicas are scraped; use the 'instance' label to distinguish them.
  - job_name: 'ziyara-backend'
    metrics_path: '/api/v1/actuator/prometheus'
    static_configs:
      - targets:
          - 'backend:8080'
          - 'backend-2:8080'

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Host machine metrics (CPU, RAM, disk, network)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Per-container Docker metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      # Extract 12-char short container ID from the cgroup id path.
      # /docker/180f88675f3b... → container="180f88675f3b"
      # Non-container paths (/, /docker, /docker/buildkit) produce no match → container=""
      - source_labels: [id]
        regex: '/docker/([a-f0-9]{12})[a-f0-9]+'
        target_label: container
        replacement: '$1'

  # Docker service discovery — maps short container ID → human-readable name.
  # cAdvisor on Docker Desktop/WSL2 only exposes cgroup IDs; it cannot resolve
  # names from the Docker daemon.  This job queries Docker directly and stores
  # the mapping as target labels.  Scrapes always fail (port 1 = instant ECONNREFUSED)
  # but Prometheus still writes up{container="...",name="..."} = 0 for each target.
  # The container_name_info recording rule converts those to value=1 for group_left joins.
  - job_name: 'docker-container-names'
    scrape_timeout: 1s
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
    relabel_configs:
      # Only keep containers that belong to this compose project
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        regex: 'ziyara'
        action: keep
      # Extract 12-char short ID to match the container label in cAdvisor metrics
      - source_labels: [__meta_docker_container_id]
        regex: '(.{12}).*'
        target_label: container
        replacement: '$1'
      # Use the Docker Compose service name as the human-readable label
      # e.g. "backend", "postgres", "redis"
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: name
      # Use container IP:1 as address — unique per container, port 1 = instant ECONNREFUSED
      - source_labels: [__meta_docker_network_ip]
        target_label: __address__
        replacement: '${1}:1'
      # Set instance to service name for readable target labels in Prometheus UI
      - source_labels: [name]
        target_label: instance
    metric_relabel_configs:
      # Drop everything — scrape always fails; we only need the target labels in up{}
      - action: drop
        source_labels: [__name__]
        regex: '.+'

