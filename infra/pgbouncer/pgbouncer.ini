; ============================================================
; DOCUMENTATION ONLY — this file is NOT mounted by Docker.
; The pgbouncer/pgbouncer:latest image generates /etc/pgbouncer/pgbouncer.ini
; at startup from environment variables in docker-compose.yml.
; This file documents the effective configuration for reference.
; ============================================================

[databases]
; Route all connections for "ziyarah" to the postgres container.
ziyarah = host=postgres port=5432 dbname=ziyarah

[pgbouncer]
; ── Pooling ──────────────────────────────────────────────────────────────────
; SESSION mode is mandatory: the app sets session-level GUCs (app.current_user_id
; etc.) via RlsAwareDataSource.applySessionVariables() using set_config(..., false).
; Transaction-mode would silently clear these between statements, breaking RLS.
pool_mode = session

; Maximum real Postgres connections PgBouncer will open.
; 2 backend replicas × 80 HikariCP max-pool = 160 slots + 10 headroom.
max_client_conn = 400
default_pool_size = 170

; ── Network ──────────────────────────────────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 5432

; ── Auth ─────────────────────────────────────────────────────────────────────
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; ── Timeouts ─────────────────────────────────────────────────────────────────
server_connect_timeout = 15
server_idle_timeout    = 600
client_idle_timeout    = 0

; ── Logging ──────────────────────────────────────────────────────────────────
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; ── Admin ────────────────────────────────────────────────────────────────────
; Access the PgBouncer admin console: psql -h 127.0.0.1 -p 7002 -U pgbouncer pgbouncer
admin_users = pgbouncer
stats_users = pgbouncer
