# Nginx reverse proxy for the 'multidomain' Docker profile.
# Routes requests to the correct container based on the Host header.
# Hosts required in /etc/hosts (or DNS):
#   127.0.0.1  app.local
#   127.0.0.1  partners.local
#   127.0.0.1  www.local

# ─── Company Dashboard — app.local ─────────────────────────────────────────────
server {
    listen 80;
    server_name app.local;
    resolver 127.0.0.11 ipv6=off valid=10s;

    # WebSocket upgrade for STOMP/SockJS (dashboard live data)
    location ^~ /api/v1/ws {
        set $api_upstream backend:8080;
        proxy_pass http://$api_upstream/api/v1/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location ^~ /api/ {
        set $api_upstream backend:8080;
        proxy_pass http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        set $company_fe dashboard-company:80;
        proxy_pass http://$company_fe;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

