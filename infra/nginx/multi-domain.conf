# ─── Landing / Booking — www.local ─────────────────────────────────────────────
server {
    listen 80;
    server_name www.local;
    resolver 127.0.0.11 ipv6=off valid=10s;

    # WebSocket upgrade for STOMP/SockJS
    location ^~ /api/v1/ws {
        set $api_upstream backend:8080;
        proxy_pass http://$api_upstream/api/v1/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Use $request_uri (not proxy_pass .../api/) when the host is a variable: nginx does not
    # apply the normal location→URI rewrite in that case, which caused /api/v1/... → 404 upstream.
    location ^~ /api/ {
        set $api_upstream backend:8080;
        proxy_pass http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        set $landing_fe landing:80;
        proxy_pass http://$landing_fe;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
