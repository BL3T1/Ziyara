# Docker's embedded DNS — forces nginx to re-resolve "backend" at runtime.
# Without this, nginx resolves upstream hostnames once at startup and caches
# the IP forever; a backend container restart silently breaks routing.
resolver 127.0.0.11 valid=15s ipv6=off;

# ── Connection-limit zone ─────────────────────────────────────────────────────
limit_conn_zone $binary_remote_addr zone=api_conn:10m;

# ── Request-rate zone ─────────────────────────────────────────────────────────
limit_req_zone  $binary_remote_addr zone=api_req:10m  rate=2000r/s;

server {
    listen 80;
    server_name _;

    limit_conn_status 503;
    limit_req_status  503;

    # set + proxy_pass $var is the nginx open-source way to trigger the resolver
    # on every request. Without a variable nginx ignores the resolver directive
    # for proxy_pass targets.
    set $backend "backend:8080";

    # ── Actuator health — no limits so Docker healthcheck always succeeds ──────
    location = /api/v1/actuator/health {
        proxy_pass         http://$backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # ── All API traffic — with connection and rate limits ──────────────────────
    location / {
        limit_conn api_conn 300;
        limit_req  zone=api_req burst=1000 nodelay;

        proxy_pass         http://$backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    65s;
        proxy_send_timeout    65s;

        proxy_buffering   on;
        proxy_buffer_size 8k;
        proxy_buffers     16 8k;
    }

    # ── Graceful overload response ─────────────────────────────────────────────
    error_page 503 @overloaded;
    location @overloaded {
        add_header Retry-After  5 always;
        add_header Content-Type "application/json" always;
        return 503 '{"code":"SERVICE_OVERLOADED","message":"Server is temporarily overloaded. Please retry in a few seconds."}';
    }
}
