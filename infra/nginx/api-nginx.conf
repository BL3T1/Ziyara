# Docker's embedded DNS — forces nginx to re-resolve upstreams at runtime.
# Without this, nginx resolves upstream hostnames once at startup and caches
# the IP forever; a backend container restart silently breaks routing.
resolver 127.0.0.11 valid=15s ipv6=off;

# ── Upstream pool — least-connections for REST ────────────────────────────────
# Distributes traffic to the backend replica with the fewest active connections.
# max_fails/fail_timeout: after 3 consecutive probe failures the backend is
# removed from the pool for 10 s; nginx re-checks it automatically afterwards.
upstream backend_pool {
    least_conn;

    server backend:8080   max_fails=3 fail_timeout=10s;
    server backend-2:8080 max_fails=3 fail_timeout=10s;

    # Reuse upstream TCP connections — reduces JVM accept() overhead.
    keepalive 64;
}

# ── Upstream pool — ip_hash for WebSocket (STOMP) ────────────────────────────
# Same client IP always routes to the same backend so STOMP subscriptions
# (held in JVM memory) survive for the lifetime of the connection.
upstream backend_ws_pool {
    ip_hash;

    server backend:8080;
    server backend-2:8080;
}

# ── Connection-limit zone ─────────────────────────────────────────────────────
limit_conn_zone $binary_remote_addr zone=api_conn:10m;

# ── Request-rate zone ─────────────────────────────────────────────────────────
limit_req_zone  $binary_remote_addr zone=api_req:10m  rate=2000r/s;

server {
    listen 80;
    server_name _;

    limit_conn_status 503;
    limit_req_status  503;

    # ── WebSocket (STOMP/SockJS) — sticky routing, exempt from rate limits ────
    # Must appear before the catch-all location.
    location ^~ /api/v1/ws {
        proxy_pass         http://backend_ws_pool;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Actuator health — no limits so Docker healthcheck always succeeds ─────
    location = /api/v1/actuator/health {
        proxy_pass         http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # ── All REST API traffic — least-conn with connection and rate limits ──────
    location / {
        limit_conn api_conn 300;
        limit_req  zone=api_req burst=1000 nodelay;

        proxy_pass         http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    65s;
        proxy_send_timeout    65s;

        proxy_buffering   on;
        proxy_buffer_size 8k;
        proxy_buffers     16 8k;
    }

    # ── Graceful overload response ─────────────────────────────────────────────
    error_page 503 @overloaded;
    location @overloaded {
        add_header Retry-After  5 always;
        add_header Content-Type "application/json" always;
        return 503 '{"code":"SERVICE_OVERLOADED","message":"Server is temporarily overloaded. Please retry in a few seconds."}';
    }
}
