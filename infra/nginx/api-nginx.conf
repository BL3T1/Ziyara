# ── Connection-limit zone ────────────────────────────────────────────────────
# Caps each IP at 300 simultaneous open connections to the API.
# Prevents a single client (or runaway k6 scenario) from exhausting Tomcat's
# virtual-thread accept queue before other clients can get a turn.
limit_conn_zone $binary_remote_addr zone=api_conn:10m;

# ── Request-rate zone ────────────────────────────────────────────────────────
# 2 000 req/s with a burst allowance of 1 000 before returning 503.
# nodelay: don't delay burst requests, just allow them up to the burst ceiling.
limit_req_zone  $binary_remote_addr zone=api_req:10m  rate=2000r/s;

# ── Upstream ─────────────────────────────────────────────────────────────────
upstream backend_upstream {
    server backend:8080;
    keepalive 128;          # persist connections to Tomcat across requests
    keepalive_requests 10000;
    keepalive_timeout 75s;
}

server {
    listen 80;
    server_name _;

    # 503 status for both shed triggers — set at server level so it applies to
    # whichever location triggers the limit.
    limit_conn_status 503;
    limit_req_status  503;

    # ── Actuator health — no limits so Docker healthcheck always succeeds ─────
    location = /api/v1/actuator/health {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── All API traffic — with connection and rate limits ─────────────────────
    location / {
        # 300 simultaneous connections per IP; 2 000 req/s burst 1 000.
        # limit_conn and limit_req are only in this location block, so the
        # health-check location above is exempt (no "off" syntax needed).
        limit_conn api_conn 300;
        limit_req  zone=api_req burst=1000 nodelay;

        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Upstream timeouts — slightly longer than k6's 60s.
        proxy_connect_timeout 10s;
        proxy_read_timeout    65s;
        proxy_send_timeout    65s;

        proxy_buffering   on;
        proxy_buffer_size 8k;
        proxy_buffers     16 8k;
    }

    # ── Graceful overload response ────────────────────────────────────────────
    error_page 503 @overloaded;
    location @overloaded {
        add_header Retry-After  5 always;
        add_header Content-Type "application/json" always;
        return 503 '{"code":"SERVICE_OVERLOADED","message":"Server is temporarily overloaded. Please retry in a few seconds."}';
    }
}
