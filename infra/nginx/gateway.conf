# ─── pgAdmin — port 7075 HTTP ────────────────────────────────────────────────────
# Internal admin tool on the LAN; TLS not required.
# BACKEND_BIND_IP and PGADMIN_BIND_IP should be 127.0.0.1 in ipmode so pgAdmin
# is only reachable through this gateway, not directly from the LAN.
server {
    listen 7075;
    server_name _;
    resolver 127.0.0.11 ipv6=off valid=10s;

    location / {
        set $upstream pgadmin:80;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
