# WebSocket upgrade map — required for Grafana Live proxying
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Gateway nginx for the 'ipmode' Docker profile.
# Single container that terminates TLS for every public port.
# Backend and frontend containers stay on HTTP on the internal Docker network.
#
# Certificate files (generated by infra/certs/generate.sh):
#   /etc/nginx/certs/server.crt
#   /etc/nginx/certs/server.key
#
# Ports exposed on BIND_IP:
#   7005 HTTPS → backend:8080       (REST API + STOMP WebSocket)
#   7050 HTTPS → company-ipmode:80  (Company dashboard)
#   7060 HTTPS → provider-ipmode:80 (Provider portal)
#   7070 HTTPS → landing-ipmode:80  (Landing / booking)
#   7083 HTTPS → prometheus:9090    (Prometheus metrics UI)
#   7085 HTTPS → grafana:3000       (Grafana dashboards)
#
# pgAdmin is NOT routed through this gateway — access via SSH tunnel only:
#   ssh -L 7065:127.0.0.1:7065 user@server  →  http://localhost:7065

# ─── API — port 7005 HTTPS ──────────────────────────────────────────────────────
server {
    listen 7005 ssl;
    server_name _;
    resolver 127.0.0.11 ipv6=off valid=10s;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # WebSocket upgrade for STOMP/SockJS (dashboard live data + mobile)
    location ^~ /api/v1/ws {
        set $backend backend:8080;
        proxy_pass http://$backend/api/v1/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host                $http_host;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # All other API traffic (REST, Swagger UI, actuator)
    location / {
        set $backend backend:8080;
        proxy_pass http://$backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host                $http_host;
        proxy_set_header X-Forwarded-Host    $http_host;
        proxy_set_header X-Forwarded-Proto   https;
        proxy_set_header Authorization       $http_authorization;
        proxy_set_header X-Real-IP           $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

