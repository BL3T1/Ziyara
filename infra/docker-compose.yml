# Compose file format hint for tooling (Snyk IaC / older parsers). Docker Compose v2 ignores this when present.
version: "3.9"

services:
  # =============================================================================
  # DATABASE SERVICE - PostgreSQL
  # =============================================================================
  postgres:
    build:
      context: ../database
      dockerfile: Dockerfile
    image: ziyarah-db:latest
    container_name: ziyarah-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ziyarah
      POSTGRES_USER: ziyarah_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ziyarah_user -d ziyarah"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =============================================================================
  # BACKEND SERVICE - Spring Boot
  # =============================================================================
  backend:
    build:
      context: ../core
      dockerfile: Dockerfile
    image: ziyarah-backend:latest
    container_name: ziyarah-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ziyarah
      SPRING_DATASOURCE_USERNAME: ziyarah_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      SPRING_DATASOURCE_DRIVER-CLASS-NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL-AUTO: update
      SPRING_JPA_SHOW-SQL: "false"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRATION: 86400000
      SERVER_PORT: 8080
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics
      # Use underscores; hyphens break relaxed binding for show-details
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: when_authorized
      APP_MEDIA_STORAGE_ROOT: /data/media
    ports:
      - "8080:8080"
    volumes:
      - media_data:/data/media
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  # =============================================================================
  # FRONTEND (CRA) - Legacy React app on port 80 (optional: build may need node/package fix)
  # =============================================================================
  frontend:
    profiles:
      - full
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8080/api/v1
    image: ziyarah-frontend:latest
    container_name: ziyarah-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # =============================================================================
  # DASHBOARD (Vite) — legacy local port :3000 (opt-in profile only; not used for prod-like tests)
  # =============================================================================
  dashboard:
    profiles:
      - legacy
    build:
      context: ../front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_SURFACE: company
    image: ziyarah-dashboard:latest
    container_name: ziyarah-dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      # 127.0.0.1 avoids IPv6 localhost (::1) failing when nginx is IPv4-only
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # =============================================================================
  # MULTI-DOMAIN (profile: multidomain) — edge proxy + company / provider / landing bundles
  # =============================================================================
  dashboard-company:
    profiles:
      - multidomain
    build:
      context: ../front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_SURFACE: company
    image: ziyarah-dashboard-company:latest
    container_name: ziyarah-dashboard-company
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  dashboard-provider:
    profiles:
      - multidomain
    build:
      context: ../front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_SURFACE: provider
    image: ziyarah-dashboard-provider:latest
    container_name: ziyarah-dashboard-provider
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  landing:
    profiles:
      - multidomain
    build:
      context: ../front/my-app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_SURFACE: landing
        VITE_COMPANY_APP_URL: http://app.local
        VITE_PROVIDER_APP_URL: http://partners.local
    image: ziyarah-landing:latest
    container_name: ziyarah-landing
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  proxy:
    profiles:
      - multidomain
    image: nginx:1.28.2-alpine
    container_name: ziyarah-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../infra/nginx/multi-domain.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      dashboard-company:
        condition: service_healthy
      dashboard-provider:
        condition: service_healthy
      landing:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - ziyarah-network

  # =============================================================================
  # PGADMIN - PostgreSQL admin UI (optional: docker compose up ... pgadmin)
  # Login: PGADMIN_DEFAULT_EMAIL / PGADMIN_DEFAULT_PASSWORD (defaults below).
  # Add server: Host=postgres, Port=5432, DB=ziyarah, User=ziyarah_user, Password=${POSTGRES_PASSWORD}
  # =============================================================================
  pgadmin:
    image: dpage/pgadmin4:9
    container_name: ziyarah-pgadmin
    restart: unless-stopped
    environment:
      # pgAdmin 9+ rejects .local as invalid (reserved TLD); use a normal domain for the default login email.
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD must be set}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ziyarah-network

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
    driver: local
  media_data:
    driver: local
  pgadmin_data:
    driver: local

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  ziyarah-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
