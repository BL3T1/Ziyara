# PostgreSQL Client Authentication Configuration
# ================================================
# Rules are evaluated top-to-bottom; first match wins.

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Unix socket — always trust (loopback, container-internal only)
local   all             all                                     trust

# IPv4/IPv6 loopback
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust

# Replication
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            trust
host    replication     all             ::1/128                 trust

# PgBouncer auth_user — trust from the internal Docker network so PgBouncer
# can connect to run auth_query without needing a plaintext password.
# The pgbouncer role has minimal privileges (execute on pgbouncer.get_auth only).
host    all             pgbouncer       172.28.0.0/16           trust

# All other TCP connections require SCRAM-SHA-256
host    all             all             all                     scram-sha-256
