# ============================================================
# Ziyara PostgreSQL tuning — containerised single-instance
# Mounted at /etc/postgresql/postgresql.conf via docker-compose.
#
# Assumptions:
#   Container memory limit : 768 MB  (raised from 512 MB — see docker-compose.yml)
#   Storage                : Docker overlay2 (treat as SSD)
#   Connections            : max 20 (HikariCP max 15 + PgBouncer overhead)
# ============================================================

# ── Memory ──────────────────────────────────────────────────
# 25% of 768 MB limit. Raising this is the single biggest perf win.
shared_buffers            = 192MB

# Per-sort / per-hash operation. 20 connections × 4 MB = 80 MB peak.
work_mem                  = 4MB

# For VACUUM, CREATE INDEX, ALTER TABLE — runs infrequently.
maintenance_work_mem      = 64MB

# Hint to the planner about total OS page-cache available.
# Set to 60% of container limit (Docker shares host page cache).
effective_cache_size      = 460MB

# ── I/O & planner ───────────────────────────────────────────
# Overlay2 / Docker volumes behave like SSDs — favour index scans.
random_page_cost          = 1.1
effective_io_concurrency  = 200

# ── WAL & checkpoints ───────────────────────────────────────
wal_buffers               = 16MB

# Spread checkpoint I/O over 90% of the checkpoint interval.
# Reduces I/O spikes that cause query latency jitter.
checkpoint_completion_target = 0.9

# ── Connections ──────────────────────────────────────────────
# Listen on all interfaces so PgBouncer can reach it over the Docker network.
listen_addresses          = '*'

# Custom HBA file — mounted alongside postgresql.conf.
# Adds a trust rule for the pgbouncer auth_user from the internal Docker subnet
# so PgBouncer can run auth_query without storing a plaintext password.
hba_file                  = '/etc/postgresql/pg_hba.conf'

# PgBouncer + HikariCP require at most ~20 real connections.
# Keep Postgres max_connections low to reduce memory overhead.
max_connections           = 25

# ── Logging ──────────────────────────────────────────────────
# Log queries slower than 500 ms — visible in Grafana via Loki.
log_min_duration_statement = 500
log_line_prefix           = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints           = on
log_lock_waits            = on

# ── Statistics ───────────────────────────────────────────────
# Required for pg_stat_statements (slow query analysis).
shared_preload_libraries  = 'pg_stat_statements'
pg_stat_statements.track  = all
