# Production profile: activate with -Dspring.profiles.active=prod
# Disables demo super admin seeding. Other demo users are already skipped by @Profile("!prod").
app:
  demo:
    super-admin:
      enabled: false

ziyara:
  cors:
    allowed-origins: "${ZIYARA_CORS_ALLOWED_ORIGINS:}"
    allow-local-defaults: false
    allow-credentials: true
  password-policy:
    min-zxcvbn-score: ${ZIYARA_PASSWORD_MIN_ZXCVBN_SCORE:3}
  security:
    headers:
      hsts-enabled: true

jwt:
  cookie:
    secure: true
    also-return-token-in-body: false

management:
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.05}
