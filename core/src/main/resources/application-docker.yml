# Behind edge / SPA nginx: trust forwarded Host/Proto so OpenAPI/Swagger URLs stay on the public origin (e.g. app.local).
server:
  forward-headers-strategy: framework

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/ziyarah
    username: ziyarah_user
    password: ziyarah_password
    hikari:
      connection-timeout: 60000
      max-lifetime: 1800000
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: kafka:9092

app:
  media:
    storage-root: ${APP_MEDIA_STORAGE_ROOT:/data/media}
    public-base-url: ${APP_MEDIA_PUBLIC_BASE_URL:}

logging:
  level:
    root: INFO
    com.ziyara.backend: INFO

ziyara:
  password-policy:
    min-zxcvbn-score: 2
  rate-limit:
    login:
      redis-enabled: ${ZIYARA_RATE_LIMIT_LOGIN_REDIS_ENABLED:false}
  notifications:
    kafka:
      enabled: true
