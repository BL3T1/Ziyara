spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  docker:
    compose:
      enabled: false

  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: true

  # Datasource is provided by Testcontainers via @ServiceConnection
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: false  # Testcontainers: fresh DB runs every migration from V0 forward
    validate-on-migrate: true

server:
  servlet:
    context-path: /api/v1

jwt:
  cookie:
    enabled: false

springdoc:
  api-docs:
    path: /api-docs

app:
  rbac-catalog-validation:
    enabled: false
  demo:
    super-admin:
      enabled: false

ziyara:
  cors:
    allowed-origins: "http://localhost"
    allow-local-defaults: false
  password-policy:
    min-zxcvbn-score: 0
  data-retention:
    enabled: false
  rate-limit:
    login:
      enabled: false
  reporting:
    materialized-view-refresh-enabled: false
  notifications:
    kafka:
      enabled: false

management:
  tracing:
    sampling:
      probability: 0
